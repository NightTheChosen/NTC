<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Preview 6421173906</title>
  <style>
    :root {
      color-scheme: light dark;
      --page-bg: #f5f7ff;
      --page-text: #172033;
      --muted-text: #51607a;
      --card-bg: rgba(255, 255, 255, 0.92);
      --card-border: rgba(15, 23, 42, 0.08);
      --card-shadow: 0 22px 48px rgba(15, 23, 42, 0.12);
      --media-bg: #eef3ff;
      --panel-bg: rgba(255, 255, 255, 0.94);
      --panel-border: rgba(15, 23, 42, 0.08);
      --panel-shadow: 0 18px 42px rgba(15, 23, 42, 0.12);
      --list-bg: rgba(15, 23, 42, 0.05);
      --list-text: #172033;
      --label-text: #111827;
      --count-text: #64748b;
      --tag-bg: rgba(88, 119, 255, 0.14);
      --tag-text: #3451c7;
      --message-text: #4b5872;
      color: var(--page-text);
      background: var(--page-bg);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    :root[data-theme="dark"] {
      --page-bg: #070b18;
      --page-text: #e8f0ff;
      --muted-text: #b0bff0;
      --card-bg: rgba(18, 24, 44, 0.96);
      --card-border: rgba(255,255,255,0.08);
      --card-shadow: 0 22px 50px rgba(0,0,0,0.18);
      --media-bg: #121b2f;
      --panel-bg: rgba(12, 18, 36, 0.98);
      --panel-border: rgba(255,255,255,0.08);
      --panel-shadow: 0 18px 42px rgba(0,0,0,0.17);
      --list-bg: rgba(255,255,255,0.04);
      --list-text: #e8f0ff;
      --label-text: #f5f8ff;
      --count-text: #8fa5cf;
      --tag-bg: rgba(88, 119, 255, 0.18);
      --tag-text: #c2d1ff;
      --message-text: #c3d1ff;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --page-bg: #070b18;
        --page-text: #e8f0ff;
        --muted-text: #b0bff0;
        --card-bg: rgba(18, 24, 44, 0.96);
        --card-border: rgba(255,255,255,0.08);
        --card-shadow: 0 22px 50px rgba(0,0,0,0.18);
        --media-bg: #121b2f;
        --panel-bg: rgba(12, 18, 36, 0.98);
        --panel-border: rgba(255,255,255,0.08);
        --panel-shadow: 0 18px 42px rgba(0,0,0,0.17);
        --list-bg: rgba(255,255,255,0.04);
        --list-text: #e8f0ff;
        --label-text: #f5f8ff;
        --count-text: #8fa5cf;
        --tag-bg: rgba(88, 119, 255, 0.18);
        --tag-text: #c2d1ff;
        --message-text: #c3d1ff;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(88, 119, 255, 0.16), transparent 30%),
                  radial-gradient(circle at 80% 10%, rgba(255, 146, 91, 0.18), transparent 18%),
                  var(--page-bg);
      color: var(--page-text);
    }

    .page-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    header {
      display: grid;
      gap: 16px;
      margin-bottom: 26px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(2rem, 2.5vw, 2.75rem);
      letter-spacing: -0.03em;
    }

    header p {
      margin: 0;
      max-width: 72ch;
      color: var(--muted-text);
      line-height: 1.7;
      font-size: 1rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) 320px;
      gap: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      border-radius: 24px;
      overflow: hidden;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      min-height: 280px;
      transition: transform 0.22s ease, border-color 0.22s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(88, 119, 255, 0.35);
    }

    .media {
      width: 100%;
      min-height: 160px;
      background: var(--media-bg);
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .content h2 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .content p {
      margin: 0;
      color: var(--muted-text);
      line-height: 1.65;
      font-size: 0.96rem;
      flex: 1;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.82rem;
      font-weight: 700;
      width: fit-content;
    }

    .sidebar {
      display: grid;
      gap: 18px;
    }

    .panel {
      border-radius: 24px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      padding: 22px;
      box-shadow: var(--panel-shadow);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.05rem;
    }

    .category-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .category-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--list-bg);
      font-size: 0.96rem;
      color: var(--list-text);
    }

    .label {
      font-weight: 700;
      color: var(--label-text);
    }

    .count {
      color: var(--count-text);
    }

    .message {
      margin: 0;
      color: var(--message-text);
      line-height: 1.7;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page-wrap {
        padding: 22px 16px 32px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <header>
      <h1>Work I've done</h1>
    </header>

    <div class="layout">
      <section class="grid" id="previewGrid"></section>

      <aside class="sidebar">
        <div class="panel">
          <h2>Preview Categories</h2>
          <ul id="categoryList" class="category-list"></ul>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const themeMedia = window.matchMedia("(prefers-color-scheme: dark)");
    const storageKey = "ntc-theme";

    function getSavedTheme() {
      try {
        const saved = localStorage.getItem(storageKey);
        return saved === "dark" || saved === "light" ? saved : null;
      } catch (error) {
        return null;
      }
    }

    function applyTheme(theme) {
      root.setAttribute("data-theme", theme);
      root.style.colorScheme = theme;
      document.body.classList.toggle("dark", theme === "dark");
    }

    function setTheme(theme) {
      try {
        localStorage.setItem(storageKey, theme);
      } catch (error) {}
      applyTheme(theme);
    }

    function handleStorageChange(event) {
      if (event.key === storageKey && (event.newValue === "dark" || event.newValue === "light")) {
        applyTheme(event.newValue);
      }
    }

    function handleThemeMessage(event) {
      const theme = event.data?.theme;
      if (theme === "dark" || theme === "light") {
        setTheme(theme);
      }
    }

    const savedTheme = getSavedTheme();
    const initialTheme = savedTheme || (themeMedia.matches ? "dark" : "light");
    applyTheme(initialTheme);

    if (typeof themeMedia.addEventListener === "function") {
      themeMedia.addEventListener("change", (event) => {
        if (!getSavedTheme()) {
          applyTheme(event.matches ? "dark" : "light");
        }
      });
    } else if (typeof themeMedia.addListener === "function") {
      themeMedia.addListener((event) => {
        if (!getSavedTheme()) {
          applyTheme(event.matches ? "dark" : "light");
        }
      });
    }

    window.addEventListener("storage", handleStorageChange);
    window.addEventListener("message", handleThemeMessage);

    function getWorkId() {
      const parts = window.location.pathname.split("/").filter(Boolean);
      const idx = parts.lastIndexOf("work");
      if (idx >= 0 && idx + 1 < parts.length) {
        return parts[idx + 1];
      }
      return parts[parts.length - 2] || "";
    }

    const workId = getWorkId();
    const isLocal = window.location.protocol === "file:" || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    const apiOrigin = isLocal ? "http://localhost:3000" : "https://ntc-fn7y.onrender.com";
    const apiUrl = `${apiOrigin}/api/work/${encodeURIComponent(workId)}/media`;
    const previewGrid = document.getElementById("previewGrid");

    function titleize(name) {
      return name.replace(/[-_]+/g, " ").replace(/\.[^/.]+$/, "").replace(/\b\w/g, (m) => m.toUpperCase());
    }

    async function loadMedia() {
      try {
        const res = await fetch(apiUrl);
        if (!res.ok) throw new Error("Media request failed");
        const data = await res.json();
        if (!Array.isArray(data.files) || data.files.length === 0) {
          previewGrid.innerHTML = '<p class="message">No image or gif files were found in this folder. Drop files into the same folder as this page and refresh.</p>';
          return;
        }

                previewGrid.innerHTML = data.files.map((file) => {
          const src = (file.url && (file.url.startsWith('http') || file.url.startsWith('data:'))) ? file.url : (apiOrigin.replace(/\/$/, '') + file.url);
          if (file.type === 'video') {
            return `
              <article class="card">
                <div class="media"><video src="${src}" controls muted loop playsinline></video></div>
                <div class="content">
                  <h2>${titleize(file.name)}</h2>
                  
                  <span class="tag">${file.type}</span>
                </div>
              </article>
            `;
          }

          return `
            <article class="card">
              <div class="media"><img src="${src}" alt="${titleize(file.name)}" loading="lazy"></div>
              <div class="content">
                <h2>${titleize(file.name)}</h2>
                
                <span class="tag">${file.type}</span>
              </div>
            </article>
          `;
        }).join('');

        const images = data.files.filter(f => f.type === 'image').length;
        const videos = data.files.filter(f => f.type === 'video').length;
        const cat = document.getElementById('categoryList');
        if (cat) {
          cat.innerHTML = '<li><span class="label">Images</span><span class="count">' + images + '</span></li>' + '<li><span class="label">Videos</span><span class="count">' + videos + '</span></li>';
        }

      } catch (err) {
        previewGrid.innerHTML = `<p class="message">Unable to load preview media. Make sure the page is served via the backend and that the server is running.</p>`;
        console.error(err);
      }
    }

    loadMedia();
  </script>
</body>
</html>
