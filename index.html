<!DOCTYPE html>
<html>
<head>
    <title>NightTheChosen's Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>⭐</text></svg>">
    <style>
        :root {
            --bg: #f0f2f3;
            --text: #222;
            --card-bg: #fff;
            --card-border: #e0e0e0;
            --accent: #0078d7;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark {
            --bg: #050712;
            --text: #e6e6e6;
            --card-bg: #111722;
            --card-border: #1f2633;
            --accent: #4da3ff;
            --shadow: rgba(0,0,0,0.6);
        }

        html {
            min-height: 100vh;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* DARK MODE TOGGLE */
        #toggleDark {
            position: fixed;
            bottom: 70px;
            right: 20px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--card-border);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 2px 6px var(--shadow);
            z-index: 11;
            white-space: nowrap;
        }

        #toggleDark:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px var(--shadow);
        }

        /* STAR FIELD */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: transparent;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        #footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--card-border);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 2px 6px var(--shadow);
            z-index: 11;
        }

        h1 {
            color: var(--accent);
            margin-bottom: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        #totals {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 2px 6px var(--shadow);
            padding: 15px 20px;
            margin-bottom: 12px;
            font-weight: 500;
            border: 1px solid var(--card-border);
        }

        #filterRow {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        #groupFilter {
            padding: 9px 12px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            font: inherit;
            min-width: 220px;
        }

        #output {
            display: grid;
            grid-template-columns: repeat(5, minmax(180px, 1fr));
            grid-auto-rows: auto;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            box-sizing: border-box;
        }

        @media (max-width: 1360px) {
            #output {
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            }
        }

        .game {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            box-shadow: 0 3px 8px var(--shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: auto;
            min-height: 340px;
            overflow: hidden;

            /* KEEP ONLY HOVER TRANSITION */
            transition: all 0.7s ease;
        }

        .game:hover {
            transform: perspective(1000px) rotateX(-5deg) translateY(-15px);
            box-shadow: 0 6px 12px var(--shadow);
            transition: all 0.3s ease;
        }

        .game img {
            width: 128px;
            height: 128px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--card-border);
        }

        .info {
            text-align: left;
            width: 100%;
        }

        .info h2 {
            margin: 0 0 10px;
            font-size: 18px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info p {
            margin: 4px 0;
            color: var(--text);
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        /* TOTALS AND TOGGLE ROW */
        #totalsRow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        #totals {
            flex: 1;
        }

        /* FOOTER */
        #footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--card-border);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 2px 6px var(--shadow);
            z-index: 10;
        }
    </style>
</head>

<body>

    <div id="stars"></div>

    <button id="toggleDark">Dark Mode</button>

    <div class="container">
        <h1>NightTheChosen's Portfolio</h1>
        <div id="totals">Loading totals...</div>
            <div id="filterRow">
                <label for="groupFilter">Creator</label>
                <select id="groupFilter">
                    <option value="">All games</option>
                </select>
            </div>
            <div id="output">Loading games...</div>
        </div>
    <script src="script.js" defer></script>

</body>
</html>
