<!DOCTYPE html>
<html>
<head>
    <title>My Contributions</title>
    <style>
        :root {
            --bg: #f0f2f3;
            --text: #222;
            --card-bg: #fff;
            --card-border: #e0e0e0;
            --accent: #0078d7;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark {
            --bg: #050712;
            --text: #e6e6e6;
            --card-bg: #111722;
            --card-border: #1f2633;
            --accent: #4da3ff;
            --shadow: rgba(0,0,0,0.6);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        /* DARK MODE TOGGLE */
        #toggleDark {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--card-border);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 2px 6px var(--shadow);
            z-index: 10;
        }

        #toggleDark:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px var(--shadow);
        }

        /* STAR FIELD */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 110px;
            height: 110px;
            mask: url(StarIcon.svg) center/contain no-repeat;
            -webkit-mask: url(StarIcon.svg) center/contain no-repeat;

            /* JS will set these */
            background-color: white;
            filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.7));

            opacity: 0.9;
            will-change: transform;
        }

        h1 {
            color: var(--accent);
            margin-bottom: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        #totals {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 2px 6px var(--shadow);
            padding: 15px 20px;
            margin-bottom: 25px;
            font-weight: 500;
            border: 1px solid var(--card-border);
        }

        #output {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            box-sizing: border-box;
        }

        .game {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            box-shadow: 0 3px 8px var(--shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: auto;
            min-height: 340px;
            overflow: hidden;

            /* KEEP ONLY HOVER TRANSITION */
            transition: all 0.7s ease;
        }

        .game:hover {
            transform: perspective(1000px) rotateX(-5deg) translateY(-15px);
            box-shadow: 0 6px 12px var(--shadow);
            transition: all 0.3s ease;
        }

        .game img {
            width: 128px;
            height: 128px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--card-border);
        }

        .info {
            text-align: left;
            width: 100%;
        }

        .info h2 {
            margin: 0 0 10px;
            font-size: 18px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info p {
            margin: 4px 0;
            color: var(--text);
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <button id="toggleDark">Dark Mode</button>

    <div id="stars"></div>

    <div class="container">
        <h1>My Contributions</h1>
        <div id="totals">Loading totals...</div>
        <div id="output">Loading games...</div>
    </div>

    <script src="script.js"></script>

    <script>
    const stars = document.getElementById("stars");
    const toggleDark = document.getElementById("toggleDark");

    const STAR_SIZE = 110;
    const MIN_SPACING = 40;
    const idleStrength = 3;
    const mouseStrength = 55;
    const followSpeed = 0.2;

    let targetX = 0.5;
    let targetY = 0.5;
    let currentX = 0.5;
    let currentY = 0.5;

    let starElements = [];

    /* DARK MODE TOGGLE */
    toggleDark.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        toggleDark.textContent =
            document.body.classList.contains("dark")
            ? "Light Mode"
            : "Dark Mode";

        updateStarColors();
    });

    /* CREATE STARS */
    function createStars() {
        stars.innerHTML = "";
        starElements = [];

        const screenW = window.innerWidth;
        const screenH = window.innerHeight;

        const cellW = STAR_SIZE + MIN_SPACING;
        const cellH = STAR_SIZE + MIN_SPACING;

        let cols = Math.floor(screenW / cellW) + 2;
        let rows = Math.floor(screenH / cellH) + 2;

        const offsetX = -cellW;
        const offsetY = -cellH;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const star = document.createElement("div");
                star.classList.add("star");

                star.style.left = (offsetX + c * cellW) + "px";
                star.style.top = (offsetY + r * cellH) + "px";

                starElements.push(star);
                stars.appendChild(star);
            }
        }

        updateStarColors();
    }

    /* FAST STAR COLOR SWITCH */
    function updateStarColors() {
        const dark = document.body.classList.contains("dark");

        starElements.forEach(star => {
            if (dark) {
                star.style.backgroundColor = "#9fc9ff";
                star.style.filter = "drop-shadow(0px 0px 10px rgba(160,200,255,0.9))";
            } else {
                star.style.backgroundColor = "#ffffff";
                star.style.filter = "drop-shadow(0px 0px 10px rgba(255,255,255,0.7))";
            }
        });
    }

    window.addEventListener("resize", createStars);

    document.addEventListener("mousemove", (e) => {
        targetX = e.clientX / window.innerWidth;
        targetY = e.clientY / window.innerHeight;
    });

    /* ANIMATION LOOP */
    function animateStars() {
        const time = Date.now() / 800;

        currentX += (targetX - currentX) * followSpeed;
        currentY += (targetY - currentY) * followSpeed;

        starElements.forEach(star => {
            const idleX = Math.sin(time) * idleStrength;
            const idleY = Math.cos(time) * idleStrength;

            const parallaxX = (currentX - 0.5) * mouseStrength;
            const parallaxY = (currentY - 0.5) * mouseStrength;

            star.style.transform =
                `translate(${idleX + parallaxX}px, ${idleY + parallaxY}px)`;
        });

        requestAnimationFrame(animateStars);
    }

    createStars();
    animateStars();
    </script>

</body>
</html>
