<!DOCTYPE html>
<html>
<head>
    <title>My Contributions</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f3f5f7;
            margin: 0;
            padding: 30px;
        }

        h1 {
            color: #0078d7;
            margin-bottom: 10px;
        }

        /* Shared container for totals + grid */
        .container {
            max-width: 1400px; /* Allows 5 cards */
            margin: 0 auto;
            box-sizing: border-box;
        }

        #totals {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            padding: 15px 20px;
            margin-bottom: 25px;
            font-weight: 500;
            border: 1px solid #e0e0e0;
        }

        #output {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); /* 5 cards */
            gap: 25px;
            justify-content: center;
            align-items: stretch; /* equal height */
            box-sizing: border-box;
        }

        .game {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* balances content */
            height: 100%;
            min-height: 340px;
            max-height: 340px; /* caps tall cards */
            overflow: hidden; /* prevents stretching */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .game:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.12);
        }

        .game img {
            width: 128px;
            height: 128px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .info {
            text-align: left;
            width: 100%;
        }

        .info h2 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* trims long names */
        }

        .info p {
            margin: 4px 0;
            color: #333;
        }

        strong {
            color: #0078d7;
        }

        a {
            color: #0078d7;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Contributions</h1>
        <div id="totals">Loading totals...</div>
        <div id="output">Loading games...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
