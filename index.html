<!DOCTYPE html>
<html>
<head>
    <title>NightTheChosen's Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>⭐</text></svg>">
    <style>
        :root {
            --bg: #f0f2f3;
            --text: #222;
            --card-bg: #fff;
            --card-border: #e0e0e0;
            --accent: #0078d7;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark {
            --bg: #050712;
            --text: #e6e6e6;
            --card-bg: #111722;
            --card-border: #1f2633;
            --accent: #4da3ff;
            --shadow: rgba(0,0,0,0.6);
        }

        html {
            min-height: 100vh;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* DARK MODE TOGGLE */
        #toggleDark {
            position: fixed;
            bottom: 70px;
            right: 20px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--card-border);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 2px 6px var(--shadow);
            z-index: 11;
            white-space: nowrap;
        }

        #toggleDark:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px var(--shadow);
        }

        /* STAR FIELD */
        #stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            background: transparent;
            transform: translateZ(0);
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: rgba(35, 57, 118, 0.95);
            box-shadow: 0 0 8px rgba(57, 101, 170, 0.5);
            will-change: transform, opacity;
            pointer-events: none;
        }

        body.dark .star {
            background: rgba(255,255,255,0.95);
            box-shadow: 0 0 8px rgba(255,255,255,0.65);
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        #footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--card-border);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 2px 6px var(--shadow);
            z-index: 11;
        }

        h1 {
            color: var(--accent);
            margin-bottom: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        #totals {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 2px 6px var(--shadow);
            padding: 15px 20px;
            margin-bottom: 12px;
            font-weight: 500;
            border: 1px solid var(--card-border);
        }

        #filterRow {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        #groupFilter {
            padding: 9px 12px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            font: inherit;
            min-width: 220px;
        }

        #output {
            display: grid;
            grid-template-columns: repeat(5, minmax(180px, 1fr));
            grid-auto-rows: auto;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            box-sizing: border-box;
        }

        @media (max-width: 1360px) {
            #output {
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            }
        }

        .game {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            box-shadow: 0 3px 8px var(--shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: auto;
            min-height: 340px;
            overflow: hidden;

            /* KEEP ONLY HOVER TRANSITION */
            transition: all 0.7s ease;
        }

        .game {
            cursor: pointer;
        }

        .game:hover {
            transform: perspective(1000px) rotateX(-5deg) translateY(-15px);
            box-shadow: 0 6px 12px var(--shadow);
            transition: all 0.3s ease;
        }

        .info {
            text-align: left;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .game-id-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: auto;
        }

        .game-id-label {
            font-size: 13px;
            color: var(--text);
            opacity: 0.8;
            word-break: break-all;
        }

        .copyIdButton {
            padding: 4px 9px;
            border: 1px solid rgba(0,0,0,0.08);
            background: var(--card-border);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font: inherit;
            font-size: 12px;
            font-weight: 700;
            transition: filter 0.16s ease, transform 0.16s ease;
        }

        .copyIdButton:hover {
            filter: brightness(0.92);
            transform: translateY(-1px);
        }

        .game img {
            width: 128px;
            height: 128px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--card-border);
        }

        #workModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 20;
        }

        #workModal.open {
            display: flex;
        }

        #workModalContent {
            width: min(1200px, 100%);
            height: min(820px, 100%);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        #workModalHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--card-border);
            background: var(--card-bg);
        }

        #workModalHeader h3 {
            margin: 0;
            font-size: 16px;
            color: var(--text);
        }

        #closeWorkModal {
            border: none;
            background: var(--accent);
            color: white;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }

        #workFrame {
            width: 100%;
            height: calc(100% - 64px);
            border: none;
            background: var(--card-bg);
        }

        #workModalPlaceholder {
            width: 100%;
            height: calc(100% - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
        }

        .info {
            text-align: left;
            width: 100%;
        }

        .info h2 {
            margin: 0 0 10px;
            font-size: 18px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info p {
            margin: 4px 0;
            color: var(--text);
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        /* TOTALS AND TOGGLE ROW */
        #totalsRow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        #totals {
            flex: 1;
        }

        /* FOOTER */
        #footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--card-border);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 2px 6px var(--shadow);
            z-index: 10;
        }
    </style>
</head>

<body>

    <div id="stars"></div>

    <button id="toggleDark">Dark Mode</button>

    <div class="container">
        <h1>NightTheChosen's Portfolio</h1>
        <div id="totals">Loading totals...</div>
            <div id="filterRow">
                <label for="groupFilter">Creator</label>
                <select id="groupFilter">
                    <option value="">All games</option>
                </select>
            </div>
            <div id="output">Loading games...</div>
        </div>
    <script src="script.js" defer></script>

    <div id="workModal" aria-hidden="true">
        <div id="workModalContent">
            <div id="workModalHeader">
                <h3 id="workModalTitle">Work Preview</h3>
                <button id="closeWorkModal">Close</button>
            </div>
            <iframe id="workFrame" title="Work preview"></iframe>
            <div id="workModalPlaceholder" hidden>
                No work preview is available for this game.
                <br><br>
                Add an <code>index.html</code> file to <code>./work/&lt;gameId&gt;/</code> and the preview will load here.
            </div>
        </div>
    </div>

</body>
</html>
