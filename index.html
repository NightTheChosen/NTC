<!DOCTYPE html>
<html>
<head>
    <title>My Contributions</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f3;
            margin: 0;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        /* STAR FIELD BEHIND EVERYTHING */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 110px; /* star size */
            height: 110px;
            background-image: url(StarIcon.webp);
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.9;
            will-change: transform;
        }

        h1 {
            color: #0078d7;
            margin-bottom: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        #totals {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            padding: 15px 20px;
            margin-bottom: 25px;
            font-weight: 500;
            border: 1px solid #e0e0e0;
        }

        #output {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            box-sizing: border-box;
        }

        .game {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            min-height: 340px;
            max-height: 340px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .game:hover {
            transform: perspective(1000px) rotateX(-5deg) translateY(-15px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.12);
        }

        .game img {
            width: 128px;
            height: 128px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .info {
            text-align: left;
            width: 100%;
        }

        .info h2 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info p {
            margin: 4px 0;
            color: #333;
        }

        strong {
            color: #0078d7;
        }

        a {
            color: #0078d7;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- ⭐ STAR GRID BEHIND EVERYTHING -->
    <div id="stars"></div>

    <div class="container">
        <h1>My Contributions</h1>
        <div id="totals">Loading totals...</div>
        <div id="output">Loading games...</div>
    </div>

    <script src="script.js"></script>

    <!-- ⭐ AUTO-SCALING STAR GRID + INERTIA SCRIPT -->
        <script>
        const stars = document.getElementById("stars");

        const STAR_SIZE = 110;        // star width/height in px
        const MIN_SPACING = 40;       // extra spacing between stars
        const idleStrength = 3;       // idle wiggle
        const mouseStrength = 55;     // mouse movement intensity
        const followSpeed = 0.2;      // inertia

        let targetX = 0.5;
        let targetY = 0.5;
        let currentX = 0.5;
        let currentY = 0.5;

        let starElements = [];

        function createStars() {
            stars.innerHTML = "";
            starElements = [];

            const screenW = window.innerWidth;
            const screenH = window.innerHeight;

            // Calculate how many stars can fit without overlapping
            const cellW = STAR_SIZE + MIN_SPACING;
            const cellH = STAR_SIZE + MIN_SPACING;

            const cols = Math.floor(screenW / cellW);
            const rows = Math.floor(screenH / cellH);

            // Center the grid
            const offsetX = (screenW - cols * cellW) / 2;
            const offsetY = (screenH - rows * cellH) / 2;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const star = document.createElement("div");
                    star.classList.add("star");

                    // Perfect spacing
                    star.style.left = (offsetX + c * cellW) + "px";
                    star.style.top = (offsetY + r * cellH) + "px";

                    star.dataset.offset = Math.random() * 1000;

                    stars.appendChild(star);
                    starElements.push(star);
                }
            }
        }

        window.addEventListener("resize", createStars);

        document.addEventListener("mousemove", (e) => {
            targetX = e.clientX / window.innerWidth;
            targetY = e.clientY / window.innerHeight;
        });

        function animateStars() {
            const time = Date.now() / 800;

            // Smooth follow
            currentX += (targetX - currentX) * followSpeed;
            currentY += (targetY - currentY) * followSpeed;

            starElements.forEach(star => {
                const offset = parseFloat(star.dataset.offset);

                const idleX = Math.sin(time + offset) * idleStrength;
                const idleY = Math.cos(time + offset) * idleStrength;

                const parallaxX = (currentX - 0.5) * mouseStrength;
                const parallaxY = (currentY - 0.5) * mouseStrength;

                star.style.transform =
                    `translate(${idleX + parallaxX}px, ${idleY + parallaxY}px)`;
            });

            requestAnimationFrame(animateStars);
        }

        createStars();
        animateStars();
        </script>

</body>
</html>
