<!DOCTYPE html>
<html>
<head>
    <title>My Contributions</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f3;
            margin: 0;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        /* STAR FIELD BEHIND EVERYTHING */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 110px; /* larger stars */
            height: 110px;
            background-image: url(StarIcon.webp);
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.9;
            will-change: transform;
        }

        h1 {
            color: #0078d7;
            margin-bottom: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        #totals {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            padding: 15px 20px;
            margin-bottom: 25px;
            font-weight: 500;
            border: 1px solid #e0e0e0;
        }

        #output {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            box-sizing: border-box;
        }

        .game {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            min-height: 340px;
            max-height: 340px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .game:hover {
            transform: perspective(1000px) rotateX(-5deg) translateY(-15px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.12);
        }

        .game img {
            width: 128px;
            height: 128px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .info {
            text-align: left;
            width: 100%;
        }

        .info h2 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info p {
            margin: 4px 0;
            color: #333;
        }

        strong {
            color: #0078d7;
        }

        a {
            color: #0078d7;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- ⭐ STAR GRID BEHIND EVERYTHING -->
    <div id="stars"></div>

    <div class="container">
        <h1>My Contributions</h1>
        <div id="totals">Loading totals...</div>
        <div id="output">Loading games...</div>
    </div>

    <script src="script.js"></script>

    <!-- ⭐ STAR ANIMATION SCRIPT -->
    <script>
    const stars = document.getElementById("stars");
    const rows = 8;
    const cols = 12;

    const idleStrength = 5;   // subtle idle wiggle
    const mouseStrength = 30;   // mouse movement intensity
    const followSpeed = 0.15;   // inertia (lower = slower follow)

    let targetX = 0.5;
    let targetY = 0.5;
    let currentX = 0.5;
    let currentY = 0.5;

    // Create evenly spaced stars
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const star = document.createElement("div");
            star.classList.add("star");

            star.style.left = (c * (100 / cols)) + "vw";
            star.style.top = (r * (100 / rows)) + "vh";

            star.dataset.offset = Math.random() * 1000;
            stars.appendChild(star);
        }
    }

    // Track mouse
    document.addEventListener("mousemove", (e) => {
        targetX = e.clientX / window.innerWidth;
        targetY = e.clientY / window.innerHeight;
    });

    // Animate stars
    function animateStars() {
        const time = Date.now() / 800;

        // Smooth follow (inertia)
        currentX += (targetX - currentX) * followSpeed;
        currentY += (targetY - currentY) * followSpeed;

        document.querySelectorAll(".star").forEach(star => {
            const offset = parseFloat(star.dataset.offset);

            const idleX = Math.sin(time + offset) * idleStrength;
            const idleY = Math.cos(time + offset) * idleStrength;

            const parallaxX = (currentX - 0.5) * mouseStrength;
            const parallaxY = (currentY - 0.5) * mouseStrength;

            star.style.transform =
                `translate(${idleX + parallaxX}px, ${idleY + parallaxY}px)`;
        });

        requestAnimationFrame(animateStars);
    }

    animateStars();
    </script>

</body>
</html>
